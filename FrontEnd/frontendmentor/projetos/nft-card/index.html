<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Card</title>
    <link rel="icon" href="assets/images/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="assets/styles/vars.css">
    <link rel="stylesheet" href="assets/styles/style.css">
</head>

<body>
    <main>
        <div class="img"><img class="nft-image" src="assets/images/image-equilibrium.jpg">

         <div class="eye">
            <img src="assets/images/icon-view.svg">
        </div>
        </div>
       
        <div class="text">
            <a class="link" href="">Equilibrium #3429</a>
            <p>Our Equilibrium collection promotes balance and calm.</p>
        </div>
        <div class="price-time">
            <div class="price">
                <img src="assets/images/icon-ethereum.svg">
                <p>0.041 ETH</p>
            </div>
            <div class="time">
                <img src="assets/images/icon-clock.svg">
                <p>3 days left</p>
            </div>
        </div>
        <hr class="line">
        <div class="author">
            <img src="assets/images/image-avatar.png">
            <p>Creation of <a class="link" href="">Jules Wyvern</a></p>
        </div>
    </main>
</body>
</html>
